name: Build and publish image

# Собирает Docker-образ и публикует его в GitHub Container Registry (GHCR)
# при каждом пуше в main (и вручную через "Run workflow").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # право пушить в GHCR под встроенным GITHUB_TOKEN

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
