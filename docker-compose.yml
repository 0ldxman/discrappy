services:
  discrapp:
    # Готовый образ из GitHub Container Registry (собирается в GitHub Actions).
    image: ghcr.io/0ldxman/discrappy:latest
    container_name: discrapp
    pull_policy: always            # при redeploy подтягивать свежий образ
    ports:
      - "8000:8000"
    volumes:
      - discrapp-data:/data        # config.json и собранные файлы (переживают пересборку)
    environment:
      DATA_DIR: /data
      # Кому разрешено встраивать UI в iframe (Nextcloud External Sites).
      # Не секрет — задаётся прямо здесь. Несколько источников через пробел.
      FRAME_ANCESTORS: "'self' https://notes.omc.root.sx"
    restart: unless-stopped

volumes:
  discrapp-data:
